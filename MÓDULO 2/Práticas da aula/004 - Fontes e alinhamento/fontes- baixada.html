<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes baixadas</title>
    <style>
        @font-face {
            font-family:'Medieval';
            src: url('fontes/Angel wish.otf') format('embedded-opentype'), url('fontes/Angel wish.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Cosmos';
            src: url('fontes/Cosmo.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Medieval';
            font-size: 2em;
        }

        h1 {
            font-family: 'Cosmos';

        }
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusamus voluptas accusantium dolores! Quo natus vel quas dolores iste doloremque repellat! Assumenda architecto magni provident, iure explicabo nam. Delectus, aspernatur asperiores?</p>
</body>
</html>
